# remark-bridge configuration
# Copy to config.yaml and adjust to your setup.

remarkable:
  # Auth: run `remark-bridge setup` to generate device token
  device_token_path: "~/.remark-bridge/device_token"

  # Folders to sync (empty = all). Use reMarkable folder names.
  sync_folders:
    - "Work"
    - "Personal"
    - "Reading"

  # Folders to ignore
  ignore_folders:
    - "Trash"
    - "Quick sheets"

  # Where to push response documents on the tablet
  response_folder: "Responses"

  # Multi-device (optional). Leave empty if you only sync a single tablet.
  # Each entry pairs a stable slug with a vault subfolder and optional
  # per-device sync/ignore lists. The slug drives the token path at
  # ~/.remark-bridge/devices/<id>/device_token.
  #
  # devices:
  #   - id: "pro"
  #     label: "Paper Pro"
  #     vault_subfolder: "rm-pro"
  #   - id: "rm2"
  #     label: "reMarkable 2"
  #     vault_subfolder: "rm-2"
  #     sync_folders: ["Notes"]
  #     ignore_folders: ["Trash", "Archive"]
  devices: []

ocr:
  # Primary engine: "remarkable_builtin" | "google_vision" | "vlm" | "tesseract"
  primary: "remarkable_builtin"

  # Fallback engine (used when primary returns empty or low confidence)
  fallback: "google_vision"

  # VLM config (when using "vlm" as primary or fallback)
  vlm:
    provider: "anthropic"
    model: "claude-sonnet-4-20250514"
    prompt_template: "default"

  # Google Vision config
  google_vision:
    credentials_path: "~/.remark-bridge/gcloud-credentials.json"
    language_hints: ["en", "de"]

  # Minimum confidence threshold (0.0-1.0) before using fallback
  confidence_threshold: 0.7

processing:
  # Model for note processing (structuring, actions, tagging)
  model: "claude-sonnet-4-20250514"
  api_key_env: "ANTHROPIC_API_KEY"

  # What to extract
  extract_actions: true
  extract_tags: true
  generate_summary: true

  # Emit slash-separated hierarchical tags ("project/foo/milestone")
  # instead of flat ones. Affects new notes only; run
  # `remark-bridge retag` to backfill the vault.
  hierarchical_tags: false

  # Action item detection
  actions:
    # Pen colors that indicate action items (reMarkable color indices)
    # 0=black, 1=grey, 2=white, 3=yellow, 4=green, 5=blue, 6=red, 7=pink
    action_colors: [6]       # red = action item
    question_colors: [5]     # blue = question/follow-up
    highlight_colors: [3]    # yellow = important

    # Also detect actions from text patterns regardless of color
    detect_from_text: true

obsidian:
  vault_path: "/home/user/obsidian-vault"

  # Folder mapping: reMarkable folder -> Obsidian subfolder
  folder_map:
    "Work": "Notes/Work"
    "Personal": "Notes/Personal"
    "Reading": "Notes/Reading"
    "_default": "Inbox"

  # Git sync
  git:
    enabled: true
    remote: "origin"
    branch: "main"
    auto_commit: true
    auto_push: true
    commit_message_template: "sync: {count} notes from reMarkable ({date})"

sync:
  # Trigger mode: "realtime" | "scheduled" | "manual" | "all"
  mode: "all"

  # Scheduled mode: cron expression
  schedule: "*/15 * * * *"    # every 15 minutes

  # Real-time mode: WebSocket reconnect settings
  websocket:
    reconnect_delay: 5
    max_reconnect_delay: 300
    ping_interval: 30

  # State database
  state_db: "~/.remark-bridge/sync_state.db"

  # Push responses back to reMarkable
  push_responses: true
  response_format: "pdf"      # "pdf" | "notebook"

  # Process only notebooks modified after this date (ISO format, optional)
  # after_date: "2025-01-01"

response:
  # Response format: "pdf" (read-only) or "notebook" (editable native .rm)
  format: "pdf"

  # Automatically trigger response generation on sync
  auto_trigger: true

  # Trigger criteria (any matching triggers an auto-response)
  trigger_on_questions: true       # Q: patterns or blue-ink strokes
  trigger_on_actions: false        # Trigger if any action items found

  # What to include in the response
  include_analysis: true           # Claude-generated analysis section
  include_related_notes: true      # Wiki-linked notes from the source

  # Folder on the reMarkable where responses are placed
  response_folder: "Responses"

microsoft:
  # Outlook + OneNote + Teams integration.
  # Requires app registration at https://entra.microsoft.com.
  enabled: false

  # From your app registration
  client_id: ""
  tenant: "common"   # "common" for personal+work accounts, or a specific tenant GUID

  # Where to cache the OAuth token
  token_cache_path: "~/.remark-bridge/msal_cache.bin"

  # Microsoft To Do
  todo_enabled: true
  todo_list_name: "reMark"
  todo_create_list: true

  # Outlook Calendar
  calendar_enabled: false
  calendar_id: ""

  # OneNote (v0.3+)
  onenote:
    enabled: false
    notebook_name: "reMark"
    default_section: "Inbox"
    folder_map:
      _default: "Inbox"
    create_missing_sections: true

  # Teams (v0.3+)
  teams:
    enabled: false
    webhook_url: ""          # Incoming Webhook URL of the target channel
    digest_cadence: "weekly" # daily | weekly | off
    digest_hour: 9
    digest_weekday: 1        # 1 = Monday
    meeting_correlation: true

notion:
  # Mirror synced notes into a Notion workspace using an internal
  # integration token. Create the integration at
  # https://www.notion.so/my-integrations, share the target parent
  # page with it, then export the token as NOTION_TOKEN.
  enabled: false
  integration_token_env: "NOTION_TOKEN"
  # ID of the Notion page under which synced notes land as children.
  # Find it in the URL: notion.so/<workspace>/<slug>-<ID>.
  vault_mirror_page_id: ""
  # Optional (reserved for a future "pull tasks back" flow)
  tasks_database_id: ""

reverse_sync:
  # Obsidian → reMarkable push-back. Three triggers, all independent.
  enabled: false
  trigger_on_frontmatter: true    # notes with `push_to_tablet: true`
  trigger_on_folder: true          # notes in the folder below
  folder: "To-Tablet"
  trigger_on_demand: true          # entries added via CLI / dashboard
  format: "pdf"                    # pdf | notebook
  target_folder: "From-Vault"
  stamp_frontmatter: true

plugins:
  # Plugin system — loads from plugin_dir + installed Python entry-points.
  enabled: true
  plugin_dir: "~/.config/remark/plugins"
  disabled: []                     # plugin names to skip
  settings: {}                     # named dicts forwarded to each plugin

web:
  # Web dashboard + PWA. Start with `remark-bridge serve-web`.
  enabled: false
  host: "127.0.0.1"
  port: 8080
  app_name: "reMark"
  # Legacy HTTP Basic auth — kept as a fallback for automation
  # scripts. The main auth path since v0.7 is session-based login
  # with per-user accounts managed at /users.
  username: ""
  password: ""
  # Session cookie secret. Generate once with `python -c 'import
  # secrets; print(secrets.token_urlsafe(32))'`. Empty = a random
  # per-process value (sessions invalidate on every restart — fine
  # for dev, bad for prod).
  session_secret: ""
  # Set True behind HTTPS so the session cookie is marked Secure.
  session_https_only: false
  # VAPID keys for Web Push. Generate with `remark-bridge vapid-keys`
  vapid_public_key: ""
  vapid_private_key: ""
  vapid_subject: "mailto:admin@example.com"

templates:
  # On-device note templates — render PDFs to push, extract fields back.
  enabled: true
  user_templates_dir: "~/.remark-bridge/templates"
  target_folder: "Templates"

reports:
  # Scheduled Claude-powered summaries pushed to configured output
  # channels (vault / teams / notion). Individual reports are created
  # from /reports in the web UI or via `remark-bridge report` on the CLI.
  enabled: true
  tick_seconds: 60

search:
  # Semantic search / RAG over synced notes.
  # When enabled, each synced note is chunked and embedded,
  # then queryable via `remark-bridge ask` or the MCP ask tool.
  enabled: false

  # Embedding backend: "voyage", "openai", or "local"
  #   voyage — best quality, requires VOYAGE_API_KEY
  #   openai — solid quality, requires OPENAI_API_KEY
  #   local  — offline via sentence-transformers, no API costs
  backend: "local"

  # Override default model for the chosen backend (optional)
  # voyage default: voyage-3.5
  # openai default: text-embedding-3-small
  # local default: all-MiniLM-L6-v2
  model: ""

  # Environment variable name holding the API key (voyage/openai only)
  # Defaults to VOYAGE_API_KEY or OPENAI_API_KEY depending on backend
  api_key_env: ""

  # Chunking parameters
  chunk_size: 512        # max characters per chunk
  chunk_overlap: 50      # overlap between consecutive chunks

  # Retrieval mode:
  #   "hybrid"   — semantic + BM25 fused via RRF (default, best quality)
  #   "semantic" — embeddings only
  #   "bm25"     — keyword-only, skips the embedding backend
  mode: "hybrid"

  # Query defaults
  top_k: 5               # number of chunks to return per query
  min_score: 0.3         # minimum similarity score (0..1)

  # If true, Claude synthesizes a grounded answer from retrieved chunks
  synthesize_answer: true
  synthesis_model: "claude-sonnet-4-20250514"

logging:
  level: "INFO"
  file: "~/.remark-bridge/bridge.log"
  max_size_mb: 50
  backup_count: 5
  # "text" (default) or "json" — JSON emits one structured record per
  # line, useful for journald / Loki / any aggregator that parses JSON.
  # Can also be toggled at runtime via the REMARK_LOG_FORMAT env var.
  format: "text"

# Pluggable LLM backend. Default is Anthropic (cloud). Set provider: ollama
# for a fully offline stack — requires `ollama serve` running on the host
# and models pulled (see docs/OLLAMA.md).
llm:
  provider: anthropic   # anthropic | ollama
  ollama:
    base_url: http://localhost:11434
    text_model: llama3.1
    vision_model: llava
    embedding_model: nomic-embed-text
    timeout_seconds: 120
