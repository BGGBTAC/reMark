# remark-bridge configuration
# Copy to config.yaml and adjust to your setup.

remarkable:
  # Auth: run `remark-bridge setup` to generate device token
  device_token_path: "~/.remark-bridge/device_token"

  # Folders to sync (empty = all). Use reMarkable folder names.
  sync_folders:
    - "Work"
    - "Personal"
    - "Reading"

  # Folders to ignore
  ignore_folders:
    - "Trash"
    - "Quick sheets"

  # Where to push response documents on the tablet
  response_folder: "Responses"

ocr:
  # Primary engine: "remarkable_builtin" | "google_vision" | "vlm" | "tesseract"
  primary: "remarkable_builtin"

  # Fallback engine (used when primary returns empty or low confidence)
  fallback: "google_vision"

  # VLM config (when using "vlm" as primary or fallback)
  vlm:
    provider: "anthropic"
    model: "claude-sonnet-4-20250514"
    prompt_template: "default"

  # Google Vision config
  google_vision:
    credentials_path: "~/.remark-bridge/gcloud-credentials.json"
    language_hints: ["en", "de"]

  # Minimum confidence threshold (0.0-1.0) before using fallback
  confidence_threshold: 0.7

processing:
  # Model for note processing (structuring, actions, tagging)
  model: "claude-sonnet-4-20250514"
  api_key_env: "ANTHROPIC_API_KEY"

  # What to extract
  extract_actions: true
  extract_tags: true
  generate_summary: true

  # Action item detection
  actions:
    # Pen colors that indicate action items (reMarkable color indices)
    # 0=black, 1=grey, 2=white, 3=yellow, 4=green, 5=blue, 6=red, 7=pink
    action_colors: [6]       # red = action item
    question_colors: [5]     # blue = question/follow-up
    highlight_colors: [3]    # yellow = important

    # Also detect actions from text patterns regardless of color
    detect_from_text: true

obsidian:
  vault_path: "/home/user/obsidian-vault"

  # Folder mapping: reMarkable folder -> Obsidian subfolder
  folder_map:
    "Work": "Notes/Work"
    "Personal": "Notes/Personal"
    "Reading": "Notes/Reading"
    "_default": "Inbox"

  # Git sync
  git:
    enabled: true
    remote: "origin"
    branch: "main"
    auto_commit: true
    auto_push: true
    commit_message_template: "sync: {count} notes from reMarkable ({date})"

sync:
  # Trigger mode: "realtime" | "scheduled" | "manual" | "all"
  mode: "all"

  # Scheduled mode: cron expression
  schedule: "*/15 * * * *"    # every 15 minutes

  # Real-time mode: WebSocket reconnect settings
  websocket:
    reconnect_delay: 5
    max_reconnect_delay: 300
    ping_interval: 30

  # State database
  state_db: "~/.remark-bridge/sync_state.db"

  # Push responses back to reMarkable
  push_responses: true
  response_format: "pdf"      # "pdf" | "notebook"

  # Process only notebooks modified after this date (ISO format, optional)
  # after_date: "2025-01-01"

response:
  # Response format: "pdf" (read-only) or "notebook" (editable native .rm)
  format: "pdf"

  # Automatically trigger response generation on sync
  auto_trigger: true

  # Trigger criteria (any matching triggers an auto-response)
  trigger_on_questions: true       # Q: patterns or blue-ink strokes
  trigger_on_actions: false        # Trigger if any action items found

  # What to include in the response
  include_analysis: true           # Claude-generated analysis section
  include_related_notes: true      # Wiki-linked notes from the source

  # Folder on the reMarkable where responses are placed
  response_folder: "Responses"

microsoft:
  # Outlook integration: push action items to Microsoft To Do
  # and deadlines to Outlook Calendar.
  # Requires app registration at https://entra.microsoft.com.
  enabled: false

  # From your app registration
  client_id: ""
  tenant: "common"   # "common" for personal+work accounts, or a specific tenant GUID

  # Where to cache the OAuth token
  token_cache_path: "~/.remark-bridge/msal_cache.bin"

  # Microsoft To Do
  todo_enabled: true
  todo_list_name: "reMark"
  todo_create_list: true   # auto-create the list if it doesn't exist

  # Outlook Calendar
  calendar_enabled: false
  calendar_id: ""          # empty = default calendar

search:
  # Semantic search / RAG over synced notes.
  # When enabled, each synced note is chunked and embedded,
  # then queryable via `remark-bridge ask` or the MCP ask tool.
  enabled: false

  # Embedding backend: "voyage", "openai", or "local"
  #   voyage — best quality, requires VOYAGE_API_KEY
  #   openai — solid quality, requires OPENAI_API_KEY
  #   local  — offline via sentence-transformers, no API costs
  backend: "local"

  # Override default model for the chosen backend (optional)
  # voyage default: voyage-3.5
  # openai default: text-embedding-3-small
  # local default: all-MiniLM-L6-v2
  model: ""

  # Environment variable name holding the API key (voyage/openai only)
  # Defaults to VOYAGE_API_KEY or OPENAI_API_KEY depending on backend
  api_key_env: ""

  # Chunking parameters
  chunk_size: 512        # max characters per chunk
  chunk_overlap: 50      # overlap between consecutive chunks

  # Query defaults
  top_k: 5               # number of chunks to return per query
  min_score: 0.3         # minimum similarity score (0..1)

  # If true, Claude synthesizes a grounded answer from retrieved chunks
  synthesize_answer: true
  synthesis_model: "claude-sonnet-4-20250514"

logging:
  level: "INFO"
  file: "~/.remark-bridge/bridge.log"
  max_size_mb: 50
  backup_count: 5
