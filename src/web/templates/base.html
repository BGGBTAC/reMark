<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ app_name }}{% endblock %}</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="theme-color" content="#1f2937">
    <link rel="icon" href="/static/icon-192.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script defer src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/service-worker.js").catch((e) =>
            console.warn("SW register failed", e)
          );
        });
      }
    </script>
    <style>
      [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">
<nav class="bg-white shadow-sm border-b">
  <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
    <a href="/" class="text-lg font-semibold text-gray-900">{{ app_name }}</a>
    <div class="flex gap-4 text-sm">
      <a href="/" class="text-gray-600 hover:text-gray-900">Dashboard</a>
      <a href="/notes" class="text-gray-600 hover:text-gray-900">Notes</a>
      <a href="/actions" class="text-gray-600 hover:text-gray-900">Actions</a>
      <a href="/ask" class="text-gray-600 hover:text-gray-900">Ask</a>
      <a href="/quick-entry" class="text-gray-600 hover:text-gray-900">+ Quick</a>
      <a href="/settings" class="text-gray-600 hover:text-gray-900">Settings</a>
    </div>
  </div>
</nav>

<main class="flex-1 max-w-6xl mx-auto px-4 py-6 w-full">
  {% block content %}{% endblock %}
</main>

<footer class="text-xs text-gray-400 text-center py-4">
  {{ app_name }} dashboard
</footer>

</body>
</html>
