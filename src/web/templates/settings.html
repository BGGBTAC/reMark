{% extends "base.html" %}
{% block title %}Settings — {{ app_name }}{% endblock %}

{% block content %}
<h1 class="text-2xl font-semibold mb-6">Settings (read-only)</h1>
<p class="text-sm text-gray-600 mb-4">
  Edit <code>config.yaml</code> directly; inline editing will land in a future release.
</p>

<div class="bg-white rounded-lg shadow-sm p-4">
  <pre class="text-xs overflow-x-auto">{{ settings | tojson(indent=2) }}</pre>
</div>
{% endblock %}
