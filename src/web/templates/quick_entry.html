{% extends "base.html" %}
{% block title %}Quick Entry — {{ app_name }}{% endblock %}

{% block content %}
<h1 class="text-2xl font-semibold mb-6">Quick entry</h1>
<p class="text-sm text-gray-600 mb-4">
  Creates a new note in your Obsidian vault's <code>Inbox/</code> folder.
</p>

<form method="post" class="bg-white rounded-lg shadow-sm p-6 space-y-4">
  <div>
    <label for="title" class="block text-sm font-medium text-gray-700 mb-1">Title</label>
    <input id="title" name="title" type="text" autocomplete="off"
           class="w-full rounded border-gray-300 text-sm px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
  </div>
  <div>
    <label for="body" class="block text-sm font-medium text-gray-700 mb-1">Content</label>
    <textarea id="body" name="body" rows="10" required
              class="w-full rounded border-gray-300 text-sm px-3 py-2 font-mono focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
  </div>
  <button type="submit" class="bg-blue-600 text-white text-sm px-4 py-2 rounded">Save note</button>
</form>
{% endblock %}
