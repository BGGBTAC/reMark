{% extends "base.html" %}
{% block title %}{{ name }} — Templates — {{ app_name }}{% endblock %}

{% block content %}
<div class="flex items-center gap-3 mb-6">
  <a href="/templates" class="text-sm text-gray-500 hover:text-gray-900">← All templates</a>
  <h1 class="text-2xl font-semibold">{{ name }}</h1>
  <span class="text-xs px-2 py-0.5 rounded bg-gray-100 text-gray-600">{{ origin }}</span>
</div>

{% if saved %}
<div class="mb-4 p-3 rounded-md bg-green-50 border border-green-200 text-green-800 text-sm">
  Saved.
</div>
{% endif %}
{% if error %}
<div class="mb-4 p-3 rounded-md bg-red-50 border border-red-200 text-red-800 text-sm">
  Validation failed:
  <pre class="mt-1 text-xs whitespace-pre-wrap">{{ error }}</pre>
</div>
{% endif %}

<form method="post" action="/templates/{{ name }}" id="template-form">
  <div id="editor" class="border border-gray-300 rounded-md overflow-hidden"
       style="min-height: 480px;"></div>
  <textarea name="source" id="source-textarea" class="hidden">{{ source }}</textarea>

  <div class="flex items-center gap-2 mt-4">
    <button type="submit"
            class="px-4 py-2 bg-gray-900 text-white text-sm rounded-md hover:bg-gray-800">
      Save
    </button>
    <button type="button" id="preview-btn"
            class="px-4 py-2 bg-white text-gray-700 text-sm rounded-md border border-gray-300 hover:bg-gray-50">
      Preview PDF
    </button>
    <a href="/templates"
       class="px-4 py-2 bg-white text-gray-700 text-sm rounded-md border border-gray-300 hover:bg-gray-50">
      Cancel
    </a>
    <span id="preview-status" class="text-xs text-gray-500 ml-2"></span>
  </div>
</form>

<script type="module">
import { basicSetup, EditorView } from "https://esm.sh/codemirror@6";
import { yaml as cmYaml } from "https://esm.sh/@codemirror/lang-yaml@6";
import { EditorState } from "https://esm.sh/@codemirror/state@6";

const textarea = document.getElementById("source-textarea");
const view = new EditorView({
  state: EditorState.create({
    doc: textarea.value,
    extensions: [basicSetup, cmYaml()],
  }),
  parent: document.getElementById("editor"),
});

// Sync editor content into the textarea on submit.
document.getElementById("template-form").addEventListener("submit", () => {
  textarea.value = view.state.doc.toString();
});

// Live preview: POST editor content, get PDF back, open in a new tab.
document.getElementById("preview-btn").addEventListener("click", async () => {
  const status = document.getElementById("preview-status");
  status.textContent = "Rendering…";
  const formData = new FormData();
  formData.set("source", view.state.doc.toString());
  const resp = await fetch("/templates/{{ name }}/preview", {
    method: "POST",
    body: formData,
  });
  if (!resp.ok) {
    const msg = await resp.json().catch(() => ({error: "Unknown error"}));
    status.textContent = "Error: " + (msg.error || resp.status);
    return;
  }
  const blob = await resp.blob();
  const url = URL.createObjectURL(blob);
  window.open(url, "_blank");
  status.textContent = "Opened preview.";
});
</script>
{% endblock %}
