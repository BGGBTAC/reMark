<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — {{ app_name }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex items-center justify-center">
  <div class="w-full max-w-sm bg-white rounded-lg shadow-sm border border-gray-100 p-6">
    <h1 class="text-xl font-semibold mb-1">Sign in to {{ app_name }}</h1>
    <p class="text-xs text-gray-500 mb-4">
      First boot? The admin bootstrap password was printed once to the server log.
    </p>

    {% if error %}
    <div class="mb-4 p-3 rounded-md bg-red-50 border border-red-200 text-red-800 text-sm">
      {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/login" class="space-y-3">
      <div>
        <label for="username" class="block text-xs font-medium text-gray-700 mb-1">Username</label>
        <input type="text" id="username" name="username" required autofocus
               class="w-full border border-gray-300 rounded-md px-3 py-1.5 text-sm">
      </div>
      <div>
        <label for="password" class="block text-xs font-medium text-gray-700 mb-1">Password</label>
        <input type="password" id="password" name="password" required
               class="w-full border border-gray-300 rounded-md px-3 py-1.5 text-sm">
      </div>
      <button type="submit"
              class="w-full px-4 py-2 bg-gray-900 text-white text-sm rounded-md hover:bg-gray-800">
        Sign in
      </button>
    </form>
  </div>
</body>
</html>
